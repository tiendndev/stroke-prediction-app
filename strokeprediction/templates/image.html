{% extends "base.html" %}

{% block title %}Form Page{% endblock %}

{% block content %}

<style>
    ::file-selector-button {
        display: none;
    }
</style>

<div class="container height-100">
    <h2 class="mt-5 mb-sm-2 ml-sm-4">Upload Image and Predict</h2>
    <form class="p-3 text-center" action="http://127.0.0.1:5000/image" method="post" enctype="multipart/form-data"
        name="file">
        <div class="container">
            <div class="input-group mb-3">
                <label class="input-group-text" for="inputGroupFile01">Upload</label>
                <input class="form-control" type="file" name="file" id="inputGroupFile01" />
            </div>

            {% if img_url %}
            <img src="{{url_for('static', filename='')+img_url}}" class="img-thumbnail col-md-6 pull-left"
                align="center" alt="predicted img">
            {% endif %}
            <button type="submit" class="btn btn-primary mt-3 mb-4 pull-letf col-md-3">Predict Image</button>

            {% if prediction %}
            <h2 class="text-center col-md-6 pull-left">{{prediction}}</h2>
            {% endif %}
        </div>
    </form>
</div>
{% endblock %}
