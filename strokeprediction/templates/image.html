{% extends "base.html" %}

{% block title %}Form Page{% endblock %}

{% block content %}

<style>
    ::file-selector-button {
        display: none;
    }
</style>

<div class="container">
    <h1 class="mt-2" align="center">Upload Image and Predict</h1>
    <form class="p-3 text-center" action="http://127.0.0.1:5000/image" method="post" enctype="multipart/form-data"
        name="file">
        <div class="input-group mb-3">
            <label class="input-group-text" for="inputGroupFile01">Upload</label>
            <input class="form-control" type="file" name="file" id="inputGroupFile01" />
        </div>
        <button type="submit" class="btn btn-primary mt-3">Predict Image</button>
    </form>
    {% if prediction %}
    <h2 class="text-center">{{prediction}}</h2>
    {% endif %}
</div>
{% endblock %}
