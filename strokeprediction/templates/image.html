{% extends "base.html" %}

{% block title %}Form Page{% endblock %}

{% block content %}

<style>
    ::file-selector-button {
        display: none;
    }
</style>

<div class="container">
    
    <form class="img-form" action="" method="post" enctype="multipart/form-data" name="file">
        <div class="row">
            <h2 class="mt-lg-5 mb-sm-5">Upload Image and Predict</h2>
        </div>
        <div class="row">
            <div class="input-group mb-3 col-6">
                <label class="input-group-text" for="inputGroupFile01">Upload</label>
                <input class="form-control col-6" type="file" name="file" id="inputGroupFile01" />
                <button type="submit" class="btn btn-primary">Predict Image</button>
            </div>
            
            <div class="row">
                {% if img_url %}
                <img src="{{url_for('static', filename='')+img_url}}" class="img-thumbnail col-md-6"
                align="center" alt="predicted img">
                {% endif %}
                
                
                {% if prediction %}
                <h2 class="col-md-6 text-center">{{prediction}}</h2>
                {% endif %}
            </div>
        </div>
    </form>
</div>


<script type="module">
    import { HOST } from "../static/constant.js"
    const form = document.querySelector(".img-form")
    console.log(form);
    form.setAttribute("action", `${HOST}/image`)

    function handleForm(event) { event.preventDefault(); } 
    form.addEventListener('load', handleForm);
</script>
{% endblock %}
