  <div class="row">
    <h2 class="mt-lg-5 mb-sm-5">I'm Doctorbot, feel free to let me know about your question</h2>
  </div>

  <!-- Question and Answer -->
  <div id="list-group" class="list-group w-auto"></div>

  <div class="input-group mb-3 col-6">
    <input type="text" class="form-control" id="chat-input" placeholder="Enter your questions here..." />
    <div class="input-group-append">
      <button id="gpt-button" class="btn btn-primary">
        <i class="fa fa-paper-plane"></i>
      </button>
    </div>
  </div>
</div>

<script>
  function handleChat() {
    var question = $("#chat-input").val();
    let html_data = "";
    html_data += `
                 <div
                    class="list-group-item list-group-item-action d-flex gap-3 py-3"
                 >
                    <img
                       src="{{ url_for('static', filename='user.jpeg') }}"
                       alt="twbs"
                       width="32"
                       height="32"
                       class="rounded-circle flex-shrink-0"
                    />
                    <div class="d-flex gap-2 w-100 justify-content-between">
                       <div id="text-message">
                          <p class="mb-0 opacity-75">
                             ${question}
                          </p>
                       </div>
                    </div>
                 </div>
              `;

    $("#chat-input").val("");
    $("#list-group").append(html_data);

    if ($(".list-group-item").length % 2 != 0) {
      $("#chat-input").attr("placeholder", "Answering...");
    }

    // Ajax call to server
    $.ajax({
      type: "POST",
      url: "/chatbot",
      data: { prompt: question },
      success: function (data) {
        let gpt_data = "";
        gpt_data += `
               <div
                  class="list-group-item list-group-item-action d-flex gap-3 py-3"
               >
                  <img
                     src="{{ url_for('static', filename='assets/img/logo.png') }}"
                     alt="twbs"
                     width="32"
                     height="32"
                     class="rounded-circle flex-shrink-0"
                  />
                  <div class="d-flex gap-2 w-100 justify-content-between">
                     <div id="text-message">
                        <p class="mb-0 opacity-75">
                           ${data.answer}
                        </p>
                     </div>
                  </div>
               </div>
            `;

        $("#list-group").append(gpt_data);
        if ($(".list-group-item").length % 2 == 0) {
          $("#chat-input").attr("placeholder", "Enter your question here...");
        }
      },
    });
  }

  $("#chat-input").change(handleChat);
  $("#gpt-button").click(handleChat);
</script>
