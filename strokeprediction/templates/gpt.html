{% extends "base.html" %} {% block title %}Chat with us{% endblock %} {% block
content %}

<div class="container">
   <!-- Begin page content -->
   <main class="flex-shrink-0">
      <div class="container">
         <br />
         <br />
         <h1 class="mt-5">Đặt câu hỏi để được nhận tư vấn nhé ^^</h1>

         <!-- Question and Answer -->
         <div id="list-group" class="list-group w-auto"></div>

         <div class="input-group mb-3">
            <input type="text" class="form-control" id="chat-input" />
            <div class="input-group-append">
               <button id="gpt-button" class="btn btn-primary">
                  Ask ChatGPT
               </button>
            </div>
         </div>
      </div>
   </main>
</div>

<script>
   $('#gpt-button').click(function () {
      var question = $('#chat-input').val();
      let html_data = '';
      html_data += `
                 <a
                    href="#"
                    class="list-group-item list-group-item-action d-flex gap-3 py-3"
                 >
                    <img
                       src="{{ url_for('static', filename='assets/img/logo.png') }}"
                       alt="twbs"
                       width="32"
                       height="32"
                       class="rounded-circle flex-shrink-0"
                    />
                    <div class="d-flex gap-2 w-100 justify-content-between">
                       <div>
                          <p class="mb-0 opacity-75">
                             ${question}
                          </p>
                       </div>
                    </div>
                 </a>
              `;

      $('#chat-input').val('');
      $('#list-group').append(html_data);

      // Ajax call to server
      $.ajax({
         type: 'POST',
         url: '/chatbot',
         data: { prompt: question },
         success: function (data) {
            let gpt_data = '';
            gpt_data += `
               <a
                  href="#"
                  class="list-group-item list-group-item-action d-flex gap-3 py-3"
               >
                  <img
                     src="{{ url_for('static', filename='assets/img/logo.png') }}"
                     alt="twbs"
                     width="32"
                     height="32"
                     class="rounded-circle flex-shrink-0"
                  />
                  <div class="d-flex gap-2 w-100 justify-content-between">
                     <div>
                        <p class="mb-0 opacity-75">
                           ${data.answer}
                        </p>
                     </div>
                  </div>
               </a>`;
            $('#list-group').append(gpt_data);
         },
      });
   });
</script>

{% endblock %}
