{% extends "base.html" %} 

{% block title %}Calendar Page{% endblock %} 

{% block content %}

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/fullcalendar/3.4.0/fullcalendar.css" />
<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.12.1/jquery-ui.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.18.1/moment.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/fullcalendar/3.4.0/fullcalendar.min.js"></script>
<script>
    $(document).ready(function() {
      var calendar = $('#calendar').fullCalendar({
        editable: true,
        header: {
          left: 'prev, next, today',
          center: 'title',
          right: 'month, agendaWeek, agendaDay'
        },
        events: [
          {% for row in calendar %}
          {
            id: '{{row.id}}',
            title: '{{row.title}}',
            start: '{{row.start_event}}',
            end: '{{row.end_event}}'
          },
          {% endfor %}
        ],

        selectable: true,
        selectHelper: true,
        select: function(start, end, allDay) {
          var title = prompt("Nhập tiêu đề sự kiện");
          if(title) {
            var start = $.fullCalendar.formatDate(start, "Y-MM-DD HH:mm:ss");
            var end = $.fullCalendar.formatDate(end, "Y-MM-DD HH:mm:ss");
            $.ajax({
              url:"/calendar/insert",
              type:"POST",
              data:{title:title, start:start, end:end},
              success:function(data) {
                alert("Thêm sự kiện thành công");
                window.location.replace("/calendar");
              }
            })
          }
        },

        editable:true,
        eventResize:function(event) {
          var start = $.fullCalendar.formatDate(event.start, "Y-MM-DD HH:mm:ss");
          var end = $.fullCalendar.formatDate(event.end, "Y-MM-DD HH:mm:ss");
          var title = event.title;
          var id = event.id;
          $.ajax({
            url:"/calendar/update",
            type:"POST",
            data: { title:title, start:start, end:end, id:id },
            success:function() {
              calendar.fullCalendar('refetchEvents');
              alert('Sự kiện đã cập nhật');
            }
          })
        },

        eventDrop: function(event) {
          var start = $.fullCalendar.formatDate(event.start, "Y-MM-DD HH:mm:ss");
          var end = $.fullCalendar.formatDate(event.end, "Y-MM-DD HH:mm:ss");
          var title = event.title;
          var id = event.id;
          $.ajax({
            url:"/calendar/update",
            type:"POST",
            data:{ title:title, start:start, end:end, id:id },
            success:function() {
              calendar.fullCalendar('refetchEvents');
              alert("Sự kiện đã cập nhật");
            }
          });
        },

        eventClick: function(event) {
          if(confirm("Bạn có chắc chắn muốn xóa không?")) {
            var id = event.id;
            $.ajax({
              url: "/calendar/ajax_delete",
              type: "POST",
              data: { id:id },
              success:function() {
                calendar.fullCalendar('refetchEvents');
                alert("Sự kiện đã được xóa");
                window.location.replace("/calendar");
              }
            })
          }
        },
      });
    });
</script>

<div class="form-container">
  <br />
  <h2 align="center" class="mt-lg-5 mb-sm-5">Patient Health Calendar<br>Bạn có thể ghi chú lịch sức khỏe để có cuộc sống lành mạnh hơn</h2>
  <br />
  <div class="form-container">
    <div id="calendar"></div>
  </div>
</div>

{% endblock %}
