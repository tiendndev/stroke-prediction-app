{% extends "base.html" %}

{% block title %}Modified Page{% endblock %}

{% block content %}


<div class="container">
    <h1 class="mt-2" align="center" class="">Datalist Page</h1>
    <div class="data-container"></div>
    <div class="action-btn"></div>
</div>


<script>
    const actionBtn = document.querySelector(".action-btn")

    async function logJSONData() {
        try {
            const response = await fetch("http://127.0.0.1:5000/patient-management/views");
            const jsonData = await response.json();
            if (jsonData[0]) {
                actionBtn.innerHTML = `
            <div class="d-grid gap-2">
                <button type="button" class="btn btn-danger pull-right mr-3 delete">Delete</button>
            </div>`
                showData(jsonData[0])
            }
            return
        } catch (error) {
            console.log(error);
        }
    }
    logJSONData()

    const showData = (data) => {
        document.querySelector('.data-container').innerHTML = `
        <div class="table-responsive">
            <table class="table table-hover">
                <thead class="thead-dark">
                    <tr>
                        <th scope="col">#</th>
                        <th scope="col">Value</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <th scope="row">Fullname</th>
                        <td>
                            <form action="" method="POST">
                                <input type="text" value="${data.fullname}" placeholder="${data.fullname}" name="fullname">
                                <button type="submit" class="btn btn-outline-success pull-right update">Update</button>
                            </form>
                        </td>
                    </tr>
                    <tr>
                        <th scope="row">Age</th>
                        <td>
                            <form action="" method="post">
                                <input type="text" value="${data.age}" placeholder="${data.age}" name="age">
                                <button type="submit" class="btn btn-outline-success pull-right update">Update</button>
                            </form>
                        </td>
                    </tr>
                    <tr>
                        <th scope="row">Gender</th>
                        <td>
                            <form action="" method="post">
                                <input type="text" value="${data.gender}" placeholder="${data.gender}" name="gender">
                                <button type="submit" class="btn btn-outline-success pull-right update">Update</button>
                            </form>
                        </td>
                    </tr>
                    <tr>
                        <th scope="row">Hypertension</th>
                        <td>
                            <form action="" method="post">
                                <input type="text" value="${data.hypertension}" placeholder="${data.hypertension}" name="hypertension">
                                <button type="submit" class="btn btn-outline-success pull-right update">Update</button>
                            </form>
                        </td>
                    </tr>
                    <tr>
                        <th scope="row">Heart desease</th>
                        <td>
                            <form action="" method="post">
                                <input type="text" value="${data.heart_desease}" placeholder="${data.heart_desease}" name="heart_desease">
                                <button type="submit" class="btn btn-outline-success pull-right update">Update</button>
                            </form>
                        </td>
                    </tr>
                    <tr>
                        <th scope="row">Ever married</th>
                        <td>
                            <form action="" method="post">
                                <input type="text" value="${data.ever_married}" placeholder="${data.ever_married}" name="ever_married">
                                <button type="submit" class="btn btn-outline-success pull-right update">Update</button>
                            </form>
                        </td>
                    </tr>
                    <tr>
                        <th scope="row">Residence type</th>
                        <td>
                            <form action="" method="post">
                                <input type="text" value="${data.resident_type}" placeholder="${data.resident_type}" name="resident_type">
                                <button type="submit" class="btn btn-outline-success pull-right update">Update</button>
                            </form>
                        </td>
                    </tr>
                    <tr>
                        <th scope="row">Work type</th>
                        <td>
                            <form action="" method="post">
                                <input type="text" value="${data.work_type}" placeholder="${data.work_type}" name="work_type">
                                <button type="submit" class="btn btn-outline-success pull-right update">Update</button>
                            </form>
                        </td>
                    </tr>
                    <tr>
                        <th scope="row">Smoking status</th>
                        <td>
                            <form action="" method="post">
                                <input type="text" value="${data.smoking_status}" placeholder="${data.smoking_status}" name="smoking_status">
                                <button type="submit" class="btn btn-outline-success pull-right update">Update</button>
                            </form>
                        </td>
                    </tr>
                    <tr>
                        <th scope="row">Avg glucose level</th>
                        <td>
                            <form action="" method="post">
                                <input type="text" value="${data.avg_glucose_level}" placeholder="${data.avg_glucose_level}" name="avg_glucose_level">
                                <button type="submit" class="btn btn-outline-success pull-right update">Update</button>
                            </form>
                        </td>
                    </tr>
                    <tr>
                        <th scope="row">BMI</th>
                        <td>
                            <form action="" method="post">
                                <input type="text" value="${data.bmi}" placeholder="${data.bmi}" name="bmi">
                                <button type="submit" class="btn btn-outline-success pull-right update">Update</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>`


        /* Delete note */
        const deleteBtn = document.querySelector(".delete")
        const deleteNote = () => {
            fetch("http://127.0.0.1:5000/patient-management/delete", {
                method: "DELETE",
            }).then((res) => (window.location.href = "/data"));
        };
        deleteBtn.onclick = () => {
            if (confirm("Do you want to delete all?")) {
                console.log("You press yes");
                deleteNote()
            }
            else {
                console.log("You press cancel");
            }
        }
    }
</script>

{% endblock %}
