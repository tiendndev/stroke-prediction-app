<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
   <head>
      <title>{% block title %} {% endblock %}</title>
      <meta charset="UTF-8" />
      <meta http-equiv="X-UA-Compatible" content="IE=edge" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />

      <!-- Bootstrap CDN -->
      <link
         rel="stylesheet"
         href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css"
         crossorigin="anonymous"
      />
      <link
         rel="stylesheet"
         href="https://cdn.jsdelivr.net/npm/boxicons@latest/css/boxicons.min.css"
      />

      <link
         href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
         rel="stylesheet"
         integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD"
         crossorigin="anonymous"
      />

      <!-- Jquery CDN -->
      <script
         src="https://code.jquery.com/jquery-3.6.4.min.js"
         integrity="sha256-oP6HI9z1XaZNBrJURtCoUT5SUnxFr8s3BzRl+cbzUq8="
         crossorigin="anonymous"
      ></script>

      <link
         rel="stylesheet"
         href="{{url_for('static', filename='styles/base.css')}}"
      />
   </head>

   <body>
      {% if user.is_authenticated %}
         <!-- Sidebar -->
         <div class="side-bar-bs" id="body-pd">
            <!-- Header -->
            <header class="header" id="header">
               <!-- Toggle button -->
               <div class="header_toggle">
                  <i class="bx bx-menu pl-xl-4" id="header-toggle"></i>
               </div>
               <!-- User avatar -->
               <div class="header_img">
                  <img src="{{url_for('static', filename='user.jpeg')}}" alt="" />
                  <!-- Menu -->
                  <div class="menu">
                     <p class="menu-email">Ngọc Tiên</p>
                     <div class="menu-item">
                        <a href="/setting">
                           <i class="bx bxs-cog"></i>
                           Setting
                        </a>
                     </div>
                     <div class="menu-item">
                        <p>
                           <i class="bx bx-moon"></i>
                           Theme
                        </p>
                        <ul class="menu-option">
                           <li class="light-mode">
                              <i class="bx bx-sun"></i>
                              Light
                           </li>
                           <li class="dark-mode">
                              <i class="bx bxs-moon"></i>
                              Dark
                           </li>
                        </ul>
                     </div>
                     <div class="menu-item">
                        <p>
                           <i class="bx bx-world"></i>
                           Language
                        </p>
                        <ul class="menu-option">
                           <li>English</li>
                           <li>Vietnamese</li>
                        </ul>
                     </div>
                     <div class="menu-item">
                        <a href="/">
                           <i class="bx bxs-home"></i>
                           Homepage
                        </a>
                     </div>
                  </div>
               </div>
               
            </header>

            <div class="l-navbar" id="nav-bar">
               <nav class="nav">
                  <div>
                     <!-- Logo -->
                     <a href="#" class="nav_logo">
                        <i class="bx bx-layer nav_logo-icon"></i>
                        <span class="nav_logo-name">Dashboard</span>
                     </a>
                     <!-- Navlist -->
                     <div class="nav_list">
                        <a href="/form" class="nav_link">
                           <i class="bx bx-file nav_icon"></i>
                           <span class="nav_name">Fill information</span>
                        </a>
                        <a href="/data" class="nav_link">
                           <i class="bx bx-info-circle nav_icon"></i>
                           <span class="nav_name">Get data</span>
                        </a>
                        <a href="/image" class="nav_link">
                           <i class="bx bx-image-add nav_icon"></i>
                           <span class="nav_name">Predict with CT-scan</span>
                        </a>
                        <a href="/chatbot" class="nav_link">
                           <i class="bx bx-chat nav_icon"></i>
                           <span class="nav_name">Chat with us</span>
                        </a>
                     </div>
                  </div>
                  <!-- Logout -->
                  <a href="/logout" class="nav_link">
                     <i class="bx bx-log-out nav_icon"></i>
                     <span class="nav_name">SignOut</span>
                  </a>
               </nav>
            </div>

            <!-- Flash message -->
           <!--  {% with messages = get_flashed_messages(with_categories = true) %} 
               {% if messages %} 
                  {% for cat, mess in messages %} 
                     {% if cat == "error" %}
                        <div
                           class="alert alert-danger"
                           role="alert"
                        >
                           {{ mess }}
                           <button type="button" class="close" data-dismiss="alert">
                              <span aria-hidden="true" class="close-btn">&times;</span>
                           </button>
                        </div>
                     {% else %}
                        <div
                           class="alert alert-success"
                           role="alert"
                        >
                           {{ mess }}
                           <button type="button" class="close" data-dismiss="alert">
                              <span aria-hidden="true" class="close-btn">&times;</span>
                           </button>
                        </div>
                     {% endif %} 
                  {% endfor %} 
               {% endif %} 
            {% endwith %} -->

            <!--Container Main start-->
            <!-- Content -->
            {% block content %} {% endblock %}
            <!-- <div></div> -->
         </div>

         <script>
            const headerImg = document.querySelector('.header_img')
            headerImg.onclick = () => {
               headerMenu.classList.toggle('menu-active')
            }
            
            const darkMode = document.querySelector('.dark-mode')
            const lightMode = document.querySelector('.light-mode')

            darkMode.onclick = () => {
               html.setAttribute('data-bs-theme', 'dark')
               localStorage.setItem('theme', 'dark');
            }

            lightMode.onclick = () => {
               html.setAttribute('data-bs-theme', 'light')
               localStorage.setItem('theme', 'light');
            }
         </script>
      {% else %} 
         {% block login %} {% endblock %} 
      {% endif %}

      <script
         src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"
         integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q"
         crossorigin="anonymous"
      ></script>
      
      <script
         src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"
         integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl"
         crossorigin="anonymous"
      ></script>

      <!-- Sidebar.js -->
      <script type="module" src="{{url_for('static', filename='sidebar.js')}}"></script>

      <script src="{{url_for('static', filename='base.js')}}"></script>
   </body>
</html>
